name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      project:
        description: "Playwright project to run (empty = all)"
        required: false
        type: choice
        options: ["", "webtv", "uctv"]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        env:
          WEBTV_BASE_URL: ${{ vars.WEBTV_BASE_URL }}
          UCTV_BASE_URL: ${{ vars.UCTV_BASE_URL }}
        run: |
          if [ -n "${{ github.event.inputs.project }}" ]; then
            npx playwright test --project="${{ github.event.inputs.project }}"
          else
            npx playwright test
          fi

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
