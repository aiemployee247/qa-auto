name: WebTV Smoke Tests

# Runs all webTV specs tagged @smoke (see projects/webtv/tests/).
# Scheduled daily at 1:00 AM US Eastern (06:00 UTC during EST).

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

run-name: "WebTV @smoke"

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run @smoke tests (webTV)
        env:
          WEBTV_BASE_URL: ${{ vars.WEBTV_BASE_URL }}
        run: npm run test:smoke:webtv

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-webtv-report
          path: playwright-report/
          retention-days: 14

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-webtv-failures
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore
